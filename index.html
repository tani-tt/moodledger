<style>
  :root{

    --purple:#7C5CFC; --purple2:#9B7AFF; --purple-d:#6B4FCC;
    --pink:#FF6B9D; --pink2:#FF8FB4; --pink-d:#E8527A;
    --teal:#4ECDC4; --teal-d:#2BAD9E;
    --amber:#FFB347; --amber-d:#C08820;
    --ink:#1A1A2E; --ink2:#3D3D5C;
    --muted:#9B8EC4; --muted2:#B0B4C8; --muted3:#C8CBD8;
    --line:rgba(124,92,252,0.07);
    --head:'Plus Jakarta Sans','Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --body:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:var(--body);
    background:linear-gradient(145deg,#6B4FCC 0%,#9B7AFF 35%,#FF6B9D 75%,#FFB347 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px 16px;color:var(--ink);
  }
  ::-webkit-scrollbar{display:none;}
  .noscroll{scrollbar-width:none;-ms-overflow-style:none;}

  .frame-wrap{position:relative;width:393px;flex-shrink:0;}
  .btn-side{position:absolute;background:#4A3080;}
  .bezel{
    width:393px;height:852px;border-radius:52px;
    background:linear-gradient(145deg,#2D1E6B,#1A1230);padding:3px;position:relative;
    box-shadow:0 60px 120px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.08),inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .screen{width:100%;height:100%;border-radius:50px;overflow:hidden;background:var(--bg);position:relative;transform:translateZ(0);}
  .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#0A0A0A;border-radius:20px;z-index:100;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px rgba(255,255,255,.05);}
  .island .cam{width:10px;height:10px;border-radius:50%;background:#1a1a1a;border:1.5px solid #2a2a2a;display:flex;align-items:center;justify-content:center;}
  .island .cam i{width:4px;height:4px;border-radius:50%;background:#0D3B3B;display:block;}
  .scroller{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  .home-ind{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:120px;height:5px;background:rgba(255,255,255,.3);border-radius:3px;}

  .page{min-height:852px;padding-bottom:96px;background:var(--bg);position:relative;}
  .card{background:var(--card);border-radius:16px;box-shadow:0 2px 12px rgba(124,92,252,.08);}
  .px5{padding-left:20px;padding-right:20px;}
  .row{display:flex;align-items:center;}
  .between{display:flex;align-items:center;justify-content:space-between;}
  .head-grad{background:linear-gradient(160deg,#EDE8FF 0%,#FFE8F3 60%,#F8F9FE 100%);}
  .head-grad-2{background:linear-gradient(160deg,#EDE8FF 0%,#F8F9FE 100%);}
  h1,h2,h3{font-family:var(--head);}
  button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}
  input,select{font-family:inherit;}
  .pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;}
  .ib{display:inline-flex;align-items:center;justify-content:center;}
  .tap{transition:transform .12s ease;}
  .tap:active{transform:scale(.94);}
  .grow{flex:1;min-width:0;}
  .trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .field{width:100%;font-size:15px;border-radius:14px;padding:14px 16px;outline:none;background:#F4F5FB;color:#1A1A2E;border:1.5px solid transparent;transition:border .2s;}
  .field:focus{border-color:rgba(124,92,252,.4);background:#fff;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideX{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  @keyframes wave{0%,100%{height:6px;}50%{height:18px;}}
  @keyframes grow-w{from{width:0 !important;}}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .anim-up{animation:fadeUp .5s ease both;}
  .anim-in{animation:fadeIn .4s ease both;}
  .anim-x{animation:slideX .35s ease both;}
  .anim-pop{animation:pop .25s ease both;}
  .d1{animation-delay:.05s;}.d2{animation-delay:.1s;}.d3{animation-delay:.18s;}.d4{animation-delay:.24s;}.d5{animation-delay:.3s;}
  #app.no-anim *{animation:none !important;animation-delay:0s !important;}

  #nav{position:absolute;left:0;right:0;bottom:0;z-index:50;}
  .nav{position:static;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);}
  .nav-inner{display:flex;align-items:flex-end;justify-content:space-around;padding:4px 8px 10px;}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;position:relative;min-width:56px;}
  .nav-item .lbl{font-size:10px;transition:.2s;}
  .nav-pill{position:absolute;inset:-4px 2px;border-radius:12px;background:rgba(124,92,252,.1);z-index:0;}
  .nav-center{display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:-20px;}
  .nav-fab{position:relative;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#7C5CFC 0%,#FF6B9D 100%);box-shadow:0 0 24px rgba(124,92,252,.55),0 4px 16px rgba(255,107,157,.35);}
  .nav-fab .glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.18) 0%,transparent 70%);animation:pulse 2s infinite;}

  .seg{display:flex;gap:4px;padding:2px;border-radius:12px;background:#EEF0F8;}
  .seg button{flex:1;padding:6px;border-radius:9px;font-size:11px;font-weight:700;color:var(--muted);transition:.2s;}
  .seg button.on{background:#fff;color:var(--purple);box-shadow:0 1px 6px rgba(124,92,252,.12);}
  .switch{width:48px;height:24px;border-radius:999px;position:relative;transition:.2s;flex-shrink:0;}
  .switch .knob{position:absolute;top:2px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .25s cubic-bezier(.4,1.4,.6,1);}

  .backdrop{position:absolute;inset:0;background:rgba(26,26,46,.45);backdrop-filter:blur(4px);z-index:60;animation:fadeIn .25s ease;}
  .sheet{position:absolute;bottom:0;left:0;right:0;z-index:70;background:var(--bg);border-radius:24px 24px 0 0;box-shadow:0 -8px 40px rgba(124,92,252,.18);animation:slideUp .32s cubic-bezier(.3,1,.5,1);display:flex;flex-direction:column;}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet .handle{width:36px;height:4px;border-radius:2px;background:#E2E4EF;margin:12px auto 0;flex-shrink:0;}
  .toast{position:absolute;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;border-radius:20px;padding:8px 16px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;z-index:90;white-space:nowrap;box-shadow:0 4px 16px rgba(78,205,196,.4);animation:pop .25s ease;}
  .empty{text-align:center;padding:32px 20px;color:#B0B4C8;}
  .empty .ico{font-size:40px;margin-bottom:10px;}
</style>

  const e=document.createElement(tag);
  if(attrs){
    for(const k in attrs){

      if(v==null||v===false) continue;
      if(k==='style'&&typeof v==='object'){Object.assign(e.style,v);}
      else if(k==='class'){e.className=v;}
      else if(k==='html'){e.innerHTML=v;}
      else if(k.startsWith('on')&&typeof v==='function'){e.addEventListener(k.slice(2).toLowerCase(),v);}
      else if(k==='ref'&&typeof v==='function'){v(e);}
      else{e.setAttribute(k,v);}
    }
  }

  kids.forEach(add);

}

/* ---------- IndexedDB layer（内存缓存 + 异步落库，渲染仍同步） ---------- */
let _idb=null;
const Store={ data:baseData(), ready:false, save(){ persist(); } };
function commit(){ Store.save(); render(); }

function openIDB(){
  return new Promise((res,rej)=>{
    if(typeof indexedDB==='undefined'||!indexedDB){ return rej('no-idb'); }
    let r; try{ r=indexedDB.open(IDB_NAME,IDB_VER); }catch(e){ return rej(e); }
    r.onupgradeneeded=(e)=>{ const db=e.target.result;
      if(!db.objectStoreNames.contains('users')) db.createObjectStore('users',{keyPath:'phone'});
      if(!db.objectStoreNames.contains('profiles')) db.createObjectStore('profiles',{keyPath:'phone'});
      if(!db.objectStoreNames.contains('meta')) db.createObjectStore('meta',{keyPath:'key'});
    };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error||'idb-open-error');
  });
}
function idbAll(db,store){ return new Promise((res)=>{ try{ const out=[]; const rq=db.transaction(store,'readonly').objectStore(store).openCursor(); rq.onsuccess=(e)=>{ const c=e.target.result; if(c){ out.push(c.value); c.continue(); } else res(out); }; rq.onerror=()=>res(out); }catch(e){ res([]); } }); }
function idbGet(db,store,key){ return new Promise((res)=>{ try{ const rq=db.transaction(store,'readonly').objectStore(store).get(key); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>res(null); }catch(e){ res(null); } }); }

function migrateFromLS(){
  try{ const raw=localStorage.getItem(LS_KEY); if(!raw) return false; const o=JSON.parse(raw); if(!o) return false;
    Store.data.users=o.users||{}; Store.data.profiles=o.profiles||{}; Store.data.session=o.session||null; Store.data.nextUserId=o.nextUserId||1001;
    if(o.ai) Store.data.ai=Object.assign(defaultAI(),o.ai);
    Object.values(Store.data.users).forEach(u=>{ if(!u.id){ u.id=Store.data.nextUserId++; } const pp=Store.data.profiles[u.phone]; if(pp&&!pp.id) pp.id=u.id; });
    return true;
  }catch(e){ return false; }
}
async function loadAll(){
  try{ _idb=await openIDB(); }catch(e){ _idb=null; }
  if(_idb){
    const users=await idbAll(_idb,'users'); const profiles=await idbAll(_idb,'profiles'); const meta=await idbGet(_idb,'meta','app');
    if(users.length||profiles.length||meta){
      Store.data.users={}; users.forEach(u=>{Store.data.users[u.phone]=u;});
      Store.data.profiles={}; profiles.forEach(p=>{Store.data.profiles[p.phone]=p;});
      Store.data.session=(meta&&meta.session)||null;
      Store.data.nextUserId=(meta&&meta.nextUserId)||1001;
      if(meta&&meta.ai) Store.data.ai=Object.assign(defaultAI(),meta.ai);
    } else if(migrateFromLS()){
      await persist(); // 把旧 localStorage 数据迁入数据库
    }
    Store.ready=true; return;
  }
  // 无 IndexedDB → 退回 localStorage
  if(migrateFromLS()){ persist(); }
  Store.ready=true;
}
function persist(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(Store.data)); }catch(e){ _mem=JSON.stringify(Store.data); } // 备份
  if(!_idb) return Promise.resolve();
  return new Promise((res)=>{
    try{
      const tx=_idb.transaction(['users','profiles','meta'],'readwrite');
      const us=tx.objectStore('users'), ps=tx.objectStore('profiles'), ms=tx.objectStore('meta');
      Object.values(Store.data.users).forEach(u=>us.put(u));
      Object.values(Store.data.profiles).forEach(p=>ps.put(p));
      ms.put({key:'app',session:Store.data.session,nextUserId:Store.data.nextUserId,ai:Store.data.ai});
      tx.oncomplete=()=>res(); tx.onerror=()=>res(); tx.onabort=()=>res();
    }catch(e){ res(); }
  });
}
function nextUserId(){ const id=Store.data.nextUserId||1001; Store.data.nextUserId=id+1; return id; }

function ym(ts){ const d=new Date(ts); return d.getFullYear()*12+d.getMonth(); }
function nowYM(){ return ym(Date.now()); }
function dateLabel(ts){ const d=new Date(ts); return (d.getMonth()+1)+'月'+d.getDate()+'日'; }
function tsToInput(ts){ const d=new Date(ts); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function inputToTs(str,orig){ if(!str) return orig||Date.now(); const parts=str.split('-').map(Number); if(parts.length!==3||isNaN(parts[0])) return orig||Date.now(); const o=orig?new Date(orig):new Date(); const d=new Date(parts[0],parts[1]-1,parts[2],o.getHours()||12,o.getMinutes()||0,0,0); return d.getTime(); }
function sameMonth(ts){ return ym(ts)===nowYM(); }

function monthSpentTotal(p){ return p.transactions.filter(t=>sameMonth(t.ts)).reduce((s,t)=>s+t.amount,0); }
function catMeta(cat){ if(TYPE_META[cat]) return TYPE_META[cat]; const p=currentProfile(); if(p&&p.customTypes){ const c=p.customTypes.find(x=>x.name===cat); if(c) return {icon:c.icon,color:c.color}; } return {icon:'📦',color:'#B0B4C8'}; }
function allTypes(p){ const customs=((p&&p.customTypes)||[]).map(c=>c.name); return PURCHASE_TYPES.filter(t=>t!=='其他').concat(customs).concat(['其他']); }
function allMotivs(p){ return MOTIVATIONS.concat(((p&&p.customMotivs)||[])); }
function motivMeta(name){ return MOTIV_COLORS[name]||{bg:'rgba(124,92,252,.1)',color:'#7C5CFC'}; }
function advancePeriod(ts,period){ const d=new Date(ts); if(period==='daily')d.setDate(d.getDate()+1); else if(period==='weekly')d.setDate(d.getDate()+7); else if(period==='biweekly')d.setDate(d.getDate()+14); else if(period==='quarterly')d.setMonth(d.getMonth()+3); else d.setMonth(d.getMonth()+1); return d.getTime(); }
function periodLabelCN(pr){ return {daily:'每天',weekly:'每周',biweekly:'每两周',monthly:'每月',quarterly:'每季'}[pr]||'每月'; }
function processRecurrings(p){ if(!p.recurrings)return 0; let n=0; const now=Date.now(); p.recurrings.forEach(r=>{ if(r.active===false)return; let guard=0; while(r.nextRun&&r.nextRun<=now&&guard<500){ const meta=catMeta(r.category); p.transactions.push({id:'t'+r.nextRun+'_'+Math.floor(Math.random()*1e5),type:'spend',name:r.name,amount:r.amount,category:r.category,catIcon:meta.icon,catColor:meta.color,motivation:r.motivation,mood:null,recurring:true,ruleId:r.id,auto:true,ts:r.nextRun}); r.lastRun=r.nextRun; r.nextRun=advancePeriod(r.nextRun,r.period); n++; guard++; } }); return n; }

function categoryAgg(p,range){
  // range: 'current' uses this month; others approximate to all data
  const txs=range==='current'?p.transactions.filter(t=>sameMonth(t.ts)):p.transactions;
  const total=txs.reduce((s,t)=>s+t.amount,0);
  const map={};
  txs.forEach(t=>{ const c=t.category||'其他'; if(!map[c])map[c]={name:c,amount:0,icon:catMeta(c).icon,color:catMeta(c).color}; map[c].amount+=t.amount; });
  const arr=Object.values(map).sort((a,b)=>b.amount-a.amount);
  arr.forEach(c=>c.pct=total>0?Math.round((c.amount/total)*100):0);
  return {arr,total};
}
function moodAgg(p){
  const txs=p.transactions.filter(t=>sameMonth(t.ts));
  const map={};
  txs.forEach(t=>{ const c=t.category||'其他'; if(!map[c])map[c]={name:c,great:0,regret:0,icon:catMeta(c).icon}; if(t.mood==='great')map[c].great+=t.amount; else if(t.mood==='regret')map[c].regret+=t.amount; });
  return Object.values(map).filter(c=>c.great>0||c.regret>0).sort((a,b)=>(b.great+b.regret)-(a.great+a.regret));
}
function inPeriod(ts,year,month){ const d=new Date(ts); if(d.getFullYear()!==year)return false; if(month!=null&&d.getMonth()+1!==month)return false; return true; }
function categoryAggP(p,year,month){
  const txs=p.transactions.filter(t=>inPeriod(t.ts,year,month));
  const total=txs.reduce((s,t)=>s+t.amount,0); const map={};
  txs.forEach(t=>{ const c=t.category||'其他'; if(!map[c])map[c]={name:c,amount:0,icon:catMeta(c).icon,color:catMeta(c).color}; map[c].amount+=t.amount; });
  const arr=Object.values(map).sort((a,b)=>b.amount-a.amount); arr.forEach(c=>c.pct=total>0?Math.round((c.amount/total)*100):0);
  return {arr,total};
}
function moodAggP(p,year,month){
  const txs=p.transactions.filter(t=>inPeriod(t.ts,year,month)); const map={};
  txs.forEach(t=>{ const c=t.category||'其他'; if(!map[c])map[c]={name:c,great:0,regret:0,icon:catMeta(c).icon}; if(t.mood==='great')map[c].great+=t.amount; else if(t.mood==='regret')map[c].regret+=t.amount; });
  return Object.values(map).filter(c=>c.great>0||c.regret>0).sort((a,b)=>(b.great+b.regret)-(a.great+a.regret));
}
function monthlyTrend(p){
  // last 6 months including current
  const out=[]; const now=new Date();
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); const key=d.getFullYear()*12+d.getMonth();
    const amt=p.transactions.filter(t=>ym(t.ts)===key).reduce((s,t)=>s+t.amount,0); out.push({month:(d.getMonth()+1)+'月',amount:amt,key}); }
  return out;
}
function recentTxs(p,months){ const cut=nowYM()-((months||3)-1); return p.transactions.filter(t=>ym(t.ts)>=cut); }
function computeHealth(p,txsIn){
  const txs=txsIn||p.transactions;
  if(txs.length===0) return null;
  const rated=txs.filter(t=>t.mood!==null);
  const greatAmt=txs.filter(t=>t.mood==='great').reduce((s,t)=>s+t.amount,0);
  const regretAmt=txs.filter(t=>t.mood==='regret').reduce((s,t)=>s+t.amount,0);
  const ratedAmt=greatAmt+regretAmt;
  const rationalPct=ratedAmt>0?Math.round((greatAmt/ratedAmt)*100):null;
  const impulseCount=txs.filter(t=>sameMonth(t.ts)&&(t.motivation==='压力发泄'||t.mood==='regret')).length;
  const regretCount=txs.filter(t=>t.mood==='regret').length;
  const regretIdx=rated.length>0?Math.round((regretCount/rated.length)*100):0;
  const savePotential=regretAmt; // ¥ identified as optimizable
  // score
  let score=60;
  if(rationalPct!=null) score=Math.round(40+rationalPct*0.5);
  score-=impulseCount*3;
  score=Math.max(10,Math.min(100,score));
  const status=score>=75?'良好':score>=55?'尚可':'需注意';
  const face=score>=75?'😊':score>=55?'🙂':'😟';
  const dims=[
    {label:'理性占比',score:rationalPct!=null?rationalPct:0,max:100,color:'#4ECDC4',icon:'🧠',desc:rationalPct!=null?('已评价消费中理性占 '+rationalPct+'%'):'还没有评价记录'},
    {label:'冲动次数',score:Math.min(impulseCount,10),max:10,color:'#FF6B9D',icon:'⚡',desc:'本月冲动消费 '+impulseCount+' 次'},
    {label:'后悔指数',score:regretIdx,max:100,color:'#FFB347',icon:'😰',desc:'后悔占比约 '+regretIdx+'%'},
    {label:'节省潜力',score:Math.min(100,Math.round(savePotential/10)),max:100,color:'#7C5CFC',icon:'💡',desc:'识别出约 ¥'+fmt(savePotential)+' 可优化'},
  ];
  return {score,status,face,rationalPct,impulseCount,regretCount,regretAmt,greatAmt,dims};
}

function aiContext(p){
  const ca=categoryAgg(p,'current'), hh=computeHealth(p);
  const monthTxs=p.transactions.filter(t=>sameMonth(t.ts));
  let s='【用户】昵称：'+p.nickname+'；性别：'+genderLabel(p.gender)+'；每月预算：'+(p.monthlyBudget?('¥'+p.monthlyBudget):'未设置')+'。\n';
  s+='【本月】支出 ¥'+fmt(monthSpentTotal(p))+'，共 '+monthTxs.length+' 笔。\n';
  if(ca.arr.length){ s+='【分类占比】'+ca.arr.slice(0,6).map(c=>c.name+' ¥'+fmt(c.amount)+'('+c.pct+'%)').join('，')+'。\n'; }
  if(hh){ s+='【健康度】'+hh.score+'/100（'+hh.status+'）'+(hh.rationalPct!=null?('，理性占比 '+hh.rationalPct+'%'):'')+'，本月冲动 '+hh.impulseCount+' 次，后悔金额 ¥'+fmt(hh.regretAmt)+'。\n'; }
  if(p.goals.length){ s+='【攒钱目标】'+p.goals.map(g=>g.name+' '+Math.round(g.current/g.target*100)+'%（¥'+fmt(g.current)+'/¥'+fmt(g.target)+'）').join('，')+'。\n'; }
  const recent=[...p.transactions].sort((a,b)=>b.ts-a.ts).slice(0,8);
  if(recent.length){ s+='【最近账单】'+recent.map(t=>t.name+' ¥'+fmt(t.amount)+'/'+t.category+(t.mood==='regret'?'(后悔)':t.mood==='great'?'(真香)':'')).join('；')+'。\n'; }
  if(p.memories&&p.memories.length){ s+='【已知偏好/记忆】'+p.memories.map(m=>m.text).join('；')+'。\n'; }
  return s;
}
function aiSystemPrompt(p){
  return aiPersona(p.coach)+'\n用户性别为「'+genderLabel(p.gender)+'」，请使用合适的称呼，不要默认当作女生。请用中文、口语化、简洁回答（一般 2-5 句，必要时分点）。基于下面这位用户的真实记账数据进行分析与建议，不要编造没有的数据：\n\n'+aiContext(p);
}
function aiReply(p,history){
  const a=Store.data.ai;
  const msgs=[{role:'system',content:aiSystemPrompt(p)}];
  history.slice(-10).forEach(m=>{ msgs.push({role:m.role==='user'?'user':'assistant',content:m.text}); });
  const url=a.baseUrl.replace(/\/+$/,'')+'/chat/completions';
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.apiKey},
    body:JSON.stringify({model:a.model||'deepseek-chat',messages:msgs,temperature:0.7,stream:false,max_tokens:600})})
    .then(r=>{ if(!r.ok) return r.text().then(t=>{throw new Error('HTTP '+r.status+(t?(' '+t.slice(0,80)):''));}); return r.json(); })
    .then(d=>{ const t=d&&d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content; if(!t) throw new Error('返回为空'); return t.trim(); });
}

function render(){
  const scEl=$('#scroller'); const prevTop=scEl?scEl.scrollTop:0;
  let path=currentPath();
  const authed=!!Store.data.session;
  const prof=currentProfile();
  if(!authed){ if(path!=='/login'&&path!=='/register') path='/login'; }
  else if(prof&&!prof.onboarded){ path='/onboarding'; }
  else if(path==='/login'||path==='/register'||path==='/onboarding') path='/';
  const sameRoute=(path===UI._lastPath);
  const app=$('#app'); app.innerHTML=''; $('#overlay').innerHTML='';
  app.className=sameRoute?'no-anim':'';
  const fn=ROUTES[path]||ROUTES['/'];
  app.appendChild(fn(UI._params||{}));
  const NAV_ROUTES={'/':1,'/analysis':1,'/add':1,'/budget':1,'/budget/settings':1,'/review':1,'/profile':1};
  const nav=$('#nav'); nav.innerHTML='';
  if(NAV_ROUTES[path]){ nav.style.display='block'; nav.appendChild(bottomNav()); } else { nav.style.display='none'; }
  if(scEl) scEl.scrollTop = sameRoute ? prevTop : 0;
  UI._lastPath=path;
}

function donutSVG(data,total,size){
  size=size||110; const r=41,cx=size/2,cy=size/2,C=2*Math.PI*r,sw=18; let acc=0,rings='';
  data.forEach(d=>{ const len=total>0?(d.value/total)*C:0; rings+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-acc}" transform="rotate(-90 ${cx} ${cy})"/>`; acc+=len; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${rings}</svg>`;
}

/* ---------- 语音录入（修复版：指针事件 + 浮层，不销毁按钮；接真实语音识别 + 中文数字解析） ---------- */
const SPEECH_OK = !!(typeof window!=='undefined' && (window.SpeechRecognition||window.webkitSpeechRecognition));
let _recTimer=null, _speech=null;
function cn2num(s){
  const map={零:0,〇:0,一:1,壹:1,二:2,两:2,贰:2,三:3,叁:3,四:4,肆:4,五:5,伍:5,六:6,陆:6,七:7,柒:7,八:8,捌:8,九:9,玖:9};
  const unit={十:10,拾:10,百:100,佰:100,千:1000,仟:1000,万:10000};
  let total=0,section=0,num=0,matched=false;
  for(const ch of s){
    if(ch in map){ num=map[ch]; matched=true; }
    else if(ch in unit){ matched=true; const u=unit[ch]; if(u===10000){ section=(section+num)*u; total+=section; section=0; num=0; } else { if(num===0)num=1; section+=num*u; num=0; } }
  }
  return matched?(total+section+num):null;
}
function parseVoice(text){
  let amount=null,name='',type=null;

  if(am){ amount=parseFloat(am[1]); }
  else { const cm=text.match(/([零〇一壹二两贰三叁四肆五伍六陆七柒八捌九玖十拾百佰千仟万]+)/); if(cm){ const v=cn2num(cm[1]); if(v!=null&&v>0) amount=v; } }
  const KW=[['餐饮',/奶茶|咖啡|饭|餐|外卖|吃|早餐|午餐|晚餐|火锅|烧烤|零食|喝/],['交通',/地铁|公交|打车|出租|滴滴|高铁|火车|机票|油费|停车|车费/],['购物',/买|衣服|鞋|包|裙|网购|淘宝|京东|拼多多|超市/],['娱乐',/电影|游戏|唱歌|ktv|演唱会|会员|音乐|视频/],['运动',/健身|跑步|运动|游泳|球|瑜伽/],['美妆',/化妆|护肤|口红|面膜|美妆|香水/],['学习',/书|课程|学习|培训|考试|网课/]];

  name=text.replace(/(\d+(?:\.\d+)?)/,'').replace(/[零〇一壹二两贰三叁四肆五伍六陆七柒八捌九玖十拾百佰千仟万]+\s*(块|元|钱|圆|毛)?/,'').replace(/(花了|花|用了|用|多少|大概|块钱|块|元钱|元|钱)/g,'').trim();

}

/* ---------- 拍照 / 相册 识别（图片→金额） ---------- */
function pickImage(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ compressImage(reader.result,(dataUrl)=>{ UI.add.receipt=dataUrl; UI.add._ocr=true; render(); recognizeReceipt(dataUrl); }); };
  reader.onerror=()=>showToast('读取图片失败');
  reader.readAsDataURL(file);
}
function compressImage(dataUrl,cb){
  try{
    const img=new Image();
    img.onload=()=>{ try{
      const max=1000; let w=img.width,hh=img.height;
      if(w>max||hh>max){ if(w>=hh){ hh=Math.round(hh*max/w); w=max; } else { w=Math.round(w*max/hh); hh=max; } }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=hh;
      cv.getContext('2d').drawImage(img,0,0,w,hh);
      cb(cv.toDataURL('image/jpeg',0.6));
    }catch(e){ cb(dataUrl); } };
    img.onerror=()=>cb(dataUrl);
    img.src=dataUrl;
  }catch(e){ cb(dataUrl); }
}
function finishOCR(amount,name,type,msg){

  if(type) s.type=type;
  showToast(msg||(amount?('识别金额 ¥'+amount):'未识别到金额，请手动输入'));
  if(currentPath()==='/add') render();
}

let _tess=null;
function loadTesseract(){
  return new Promise((res,rej)=>{
    if(typeof window!=='undefined'&&window.Tesseract) return res(window.Tesseract);
    if(_tess) return _tess.then(res,rej);
    _tess=new Promise((rs,rj)=>{ try{ const sc=document.createElement('script'); sc.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'; sc.onload=()=>window.Tesseract?rs(window.Tesseract):rj(new Error('no-tesseract')); sc.onerror=()=>rj(new Error('load-fail')); document.head.appendChild(sc); }catch(e){ rj(e); } });
    _tess.then(res,rej);
  });
}
function parseReceiptText(text){
  const t=(text||'').replace(/\s+/g,' ');
  let amount=null;
  // 优先"合计/总计/应收/金额/实付"后面的数字
  const key=t.match(/(合计|總計|总计|应收|應收|实付|實付|金额|金額|总金额|應付|应付|total|amount)[^0-9]{0,6}([0-9]+(?:\.[0-9]{1,2})?)/i);
  if(key){ amount=parseFloat(key[2]); }
  if(amount==null){ const ms=(t.match(/[0-9]+(?:\.[0-9]{1,2})?/g)||[]).filter(x=>{const n=parseFloat(x);return n>0&&n<100000;}); if(ms.length){ const money=ms.filter(x=>/\.[0-9]{2}$/.test(x)); const pool=(money.length?money:ms).map(parseFloat); amount=Math.max.apply(null,pool); } }
  let type=null; const KW=[['餐饮',/餐|饭|奶茶|咖啡|超市|食|烤|火锅|外卖/],['购物',/服饰|衣|鞋|商场|百货|优衣|zara|uniqlo/i],['交通',/出租|滴滴|地铁|加油|停车|高铁|机票/],['娱乐',/影院|电影|ktv|游戏/i],['美妆',/美妆|护肤|化妆|丝芙兰/]];
  for(const k of KW){ if(k[1].test(t)){ type=k[0]; break; } }
  let name=''; const m=t.match(/[一-龥]{2,8}(店|超市|餐厅|咖啡|奶茶|商场|百货)/); if(m) name=m[0]; if(name.length>10)name=name.slice(0,10);
  return {amount,name,type};
}
function aiVision(dataUrl){
  const a=Store.data.ai;
  const sys='你是小票识别助手。从图片中读出本次消费的总金额，并猜测消费类别（餐饮/购物/娱乐/运动/交通/美妆/学习/其他之一）与商家名。只返回 JSON：{"amount":数字,"name":"商家或商品","category":"类别"}，无法识别的字段留空。';
  const url=a.baseUrl.replace(/\/+$/,'')+'/chat/completions';
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.apiKey},
    body:JSON.stringify({model:a.model,messages:[{role:'system',content:sys},{role:'user',content:[{type:'text',text:'识别这张小票'},{type:'image_url',image_url:{url:dataUrl}}]}],temperature:0,max_tokens:200})})
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(d=>{ const c=d.choices[0].message.content; const mm=c.match(/\{[\s\S]*\}/); const o=JSON.parse(mm?mm[0]:c); return {amount:o.amount!=null?parseFloat(o.amount):null,name:o.name||'',type:PURCHASE_TYPES.indexOf(o.category)>=0?o.category:null}; });
}

/* ---------- 账单 CSV 导入 / 导出 ---------- */
function csvCell(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?('"'+v.replace(/"/g,'""')+'"'):v; }
function exportCSV(){
  try{
    const p=currentProfile();
    const rows=[['日期','名称','金额','类型','动机','心情']];
    [...p.transactions].sort((a,b)=>a.ts-b.ts).forEach(t=>{ const d=new Date(t.ts); const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); rows.push([ds,t.name,t.amount,t.category||'',t.motivation||'',t.mood==='great'?'真香':t.mood==='regret'?'后悔':'']); });
    const csv='﻿'+rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='MoodLedger账单_'+new Date().toISOString().slice(0,10)+'.csv'; document.body.appendChild(a); a.click(); setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    showToast('已导出 '+(rows.length-1)+' 笔账单');
  }catch(e){ showToast('导出失败：'+(e&&e.message||'')); }
}
function parseCSV(text){
  const rows=[]; let row=[],cur='',q=false; text=text.replace(/^﻿/,'');
